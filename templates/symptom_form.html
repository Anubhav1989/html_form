<!DOCTYPE html>
<html lang="en">
<head>
    <title>Symptom Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2235;
            --border: rgba(255,255,255,0.07);
            --border-focus: rgba(0,212,170,0.4);
            --accent: #00d4aa;
            --accent2: #3b82f6;
            --text: #f0f4ff;
            --muted: #8a9bb5;
            --yes-bg: rgba(0,212,170,0.08);
            --yes-border: rgba(0,212,170,0.3);
            --no-bg: rgba(255,107,107,0.06);
            --no-border: rgba(255,107,107,0.2);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,212,170,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 20% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-wrap { margin-bottom: 28px; }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .progress-label.done { color: var(--accent); }
        .progress-label.active { color: var(--accent); }

        .progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 100px;
        }

        .step-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            color: var(--accent2);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 100px;
            margin-bottom: 10px;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .desc {
            color: var(--muted);
            font-size: 13px;
            font-weight: 300;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Toggle card style for symptoms */
        .symptom-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }

        .symptom-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .symptom-icon {
            width: 36px; height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .symptom-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 15px;
        }

        .symptom-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
        }

        .toggle-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .toggle-btn {
            padding: 9px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }

        .toggle-btn.yes:hover, .toggle-btn.yes.active {
            background: var(--yes-bg);
            border-color: var(--yes-border);
            color: var(--accent);
        }

        .toggle-btn.no:hover, .toggle-btn.no.active {
            background: var(--no-bg);
            border-color: var(--no-border);
            color: #ff8a8a;
        }

        /* Hidden selects for form submission */
        .hidden-select { display: none; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 7px;
        }

        select {
            width: 100%;
            padding: 11px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0,212,170,0.08);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-back {
            padding: 13px 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .btn-back:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
        }

        button[type="submit"] {
            flex: 1;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            color: #0a0f1e;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.03em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
            box-shadow: 0 4px 20px rgba(0,212,170,0.2);
        }

        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(0,212,170,0.3);
        }

        button[type="submit"] svg { transition: transform 0.2s; }
        button[type="submit"]:hover svg { transform: translateX(3px); }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="card">
        <div class="progress-wrap">
            <div class="progress-labels">
                <span class="progress-label done">Patient</span>
                <span class="progress-label active">Symptoms</span>
                <span class="progress-label">History</span>
                <span class="progress-label">Predict</span>
            </div>
            <div class="progress-track"><div class="progress-fill"></div></div>
        </div>

        <div class="step-tag">Step 2 of 4</div>
        <h2>Symptom Details</h2>
        <p class="desc">Indicate which symptoms the patient is currently experiencing.</p>

        <form action="/submit_symptoms" method="post">
            <input type="hidden" name="patient_id" value="{{ patient_id }}">

            <!-- Cough -->
            <div class="symptom-card">
                <div class="symptom-header">
                    <div class="symptom-icon" style="background: rgba(0,212,170,0.1);">🤧</div>
                    <div>
                        <div class="symptom-title">Cough</div>
                        <div class="symptom-sub">Persistent or dry cough</div>
                    </div>
                </div>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn yes" onclick="setSymptom('cough', '1', this)">✓ Yes</button>
                    <button type="button" class="toggle-btn no active" onclick="setSymptom('cough', '0', this)">✗ No</button>
                </div>
                <select name="cough" class="hidden-select" id="cough-select">
                    <option value="0" selected>No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <!-- Fever -->
            <div class="symptom-card">
                <div class="symptom-header">
                    <div class="symptom-icon" style="background: rgba(255,107,107,0.1);">🌡️</div>
                    <div>
                        <div class="symptom-title">Fever</div>
                        <div class="symptom-sub">Elevated body temperature</div>
                    </div>
                </div>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn yes" onclick="setSymptom('fever', '1', this)">✓ Yes</button>
                    <button type="button" class="toggle-btn no active" onclick="setSymptom('fever', '0', this)">✗ No</button>
                </div>
                <select name="fever" class="hidden-select" id="fever-select">
                    <option value="0" selected>No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="btn-row">
                <a href="/patient_form" class="btn-back">← Back</a>
                <button type="submit">
                    Next: History
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </form>
    </div>

    <script>
        function setSymptom(name, value, btn) {
            const card = btn.closest('.symptom-card');
            card.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(name + '-select').value = value;
        }
    </script>
</body>
</html>
